<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Space Calc</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Share+Tech+Mono&display=swap');

    :root {
      --cyan:   #00f5ff;
      --blue:   #0066ff;
      --purple: #9d00ff;
      --glow:   rgba(0,245,255,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #00000f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    /* ── Canvas de estrelas ── */
    #stars { position: fixed; inset: 0; z-index: 0; }

    /* ── Planeta decorativo ── */
    .planet {
      position: fixed;
      bottom: -120px; right: -80px;
      width: 340px; height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #1a0a4a, #060012);
      box-shadow:
        inset -30px -20px 60px rgba(157,0,255,0.5),
        inset 20px 20px 50px rgba(0,100,255,0.2),
        0 0 80px rgba(157,0,255,0.2);
      z-index: 0;
    }
    .planet::after {
      content: '';
      position: absolute;
      top: 28%; left: -30%;
      width: 160%; height: 30%;
      border-radius: 50%;
      border: 2px solid rgba(157,0,255,0.35);
      transform: rotateX(72deg);
      box-shadow: 0 0 20px rgba(157,0,255,0.2);
    }

    /* ── Astronauta flutuando ── */
    .astronaut {
      position: fixed;
      top: 60px; left: 40px;
      font-size: 3rem;
      animation: float 6s ease-in-out infinite;
      z-index: 0;
      filter: drop-shadow(0 0 12px rgba(0,245,255,0.5));
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-8deg); }
      50%      { transform: translateY(-22px) rotate(6deg); }
    }

    /* ── Wrapper ── */
    .calc-wrap {
      position: relative;
      z-index: 1;
      animation: zoomIn .7s cubic-bezier(.16,1,.3,1);
    }
    @keyframes zoomIn {
      from { opacity:0; transform: scale(.85) translateY(30px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    /* ── HUD frame ── */
    .hud-corner {
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--cyan);
      border-style: solid;
      opacity: 0.7;
    }
    .hud-corner.tl { top:-4px; left:-4px;  border-width: 2px 0 0 2px; }
    .hud-corner.tr { top:-4px; right:-4px; border-width: 2px 2px 0 0; }
    .hud-corner.bl { bottom:-4px; left:-4px;  border-width: 0 0 2px 2px; }
    .hud-corner.br { bottom:-4px; right:-4px; border-width: 0 2px 2px 0; }

    /* ── Calculadora ── */
    .calc {
      position: relative;
      width: 340px;
      background: rgba(0,5,20,0.85);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 12px;
      padding: 22px;
      box-shadow:
        0 0 0 1px rgba(0,245,255,0.05),
        0 0 40px rgba(0,100,255,0.15),
        0 0 80px rgba(0,0,30,0.8),
        inset 0 0 60px rgba(0,10,40,0.5);
    }

    /* Linha de scan animada */
    .calc::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: scan 3s linear infinite;
      opacity: 0.5;
      border-radius: 12px 12px 0 0;
    }
    @keyframes scan {
      0%   { top: 0%; opacity: .6; }
      100% { top: 100%; opacity: 0; }
    }

    /* ── Título ── */
    .title {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--cyan);
      text-align: center;
      margin-bottom: 14px;
      opacity: 0.6;
      text-transform: uppercase;
    }

    /* ── Display ── */
    .display {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,245,255,0.15);
      border-radius: 8px;
      padding: 16px 18px 14px;
      margin-bottom: 16px;
      min-height: 108px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 4px;
      position: relative;
      overflow: hidden;
    }

    /* Grade holográfica no display */
    .display::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .display__history {
      font-size: 0.7rem;
      color: rgba(0,245,255,0.25);
      min-height: 14px;
      text-align: right;
      z-index: 1;
    }

    .display__expr {
      font-size: 0.85rem;
      color: rgba(0,245,255,0.45);
      min-height: 18px;
      text-align: right;
      z-index: 1;
    }

    .display__number {
      font-family: 'Orbitron', monospace;
      font-size: 2.4rem;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,245,255,0.3);
      text-align: right;
      word-break: break-all;
      line-height: 1.1;
      z-index: 1;
      transition: transform .15s cubic-bezier(.34,1.56,.64,1);
    }

    .display__number.pop { transform: scale(1.07); }

    /* Indicadores de status */
    .status-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      animation: blink 2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .4s; background: #9d00ff; box-shadow: 0 0 6px #9d00ff; }
    .dot:nth-child(3) { animation-delay: .8s; background: #0066ff; box-shadow: 0 0 6px #0066ff; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .status-text {
      font-size: 0.55rem;
      color: rgba(0,245,255,0.35);
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    /* ── Grid de botões ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    /* Botão */
    .btn {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0,245,255,0.12);
      border-radius: 8px;
      height: 60px;
      font-size: 1rem;
      font-family: 'Share Tech Mono', monospace;
      cursor: pointer;
      transition: transform .1s, box-shadow .15s;
      outline: none;
      letter-spacing: .02em;
    }

    .btn:hover  { border-color: rgba(0,245,255,0.35); }
    .btn:active { transform: scale(.9); }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,245,255,0.3);
      transform: scale(0);
      animation: rpl .5s linear;
      pointer-events: none;
    }
    @keyframes rpl { to { transform: scale(4); opacity: 0; } }

    .btn--num {
      background: rgba(0,20,60,0.7);
      color: #c8e8ff;
    }
    .btn--num:hover { background: rgba(0,30,80,0.9); box-shadow: 0 0 12px rgba(0,100,255,0.2); }

    .btn--op {
      background: rgba(0,50,80,0.6);
      color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan);
      border-color: rgba(0,245,255,0.2);
    }
    .btn--op:hover { box-shadow: 0 0 16px rgba(0,245,255,0.25); }

    .btn--ac {
      background: rgba(80,0,30,0.6);
      color: #ff4d8d;
      text-shadow: 0 0 8px #ff4d8d;
      border-color: rgba(255,77,141,0.25);
    }
    .btn--ac:hover { box-shadow: 0 0 16px rgba(255,77,141,0.3); }

    .btn--del {
      background: rgba(60,20,0,0.6);
      color: #ff9d00;
      text-shadow: 0 0 8px #ff9d00;
      border-color: rgba(255,157,0,0.25);
    }
    .btn--del:hover { box-shadow: 0 0 16px rgba(255,157,0,0.3); }

    .btn--eq {
      grid-column: span 2;
      background: linear-gradient(135deg, rgba(0,100,255,0.5), rgba(157,0,255,0.5));
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: .85rem;
      letter-spacing: .15em;
      border-color: rgba(157,0,255,0.4);
      box-shadow: 0 0 20px rgba(100,0,255,0.25);
      text-shadow: 0 0 10px #fff;
    }
    .btn--eq:hover {
      box-shadow: 0 0 30px rgba(157,0,255,0.5), 0 0 60px rgba(0,100,255,0.2);
      border-color: rgba(157,0,255,0.7);
    }

    .btn--zero { grid-column: span 2; }

    .key-hint {
      position: absolute;
      top: 5px; right: 6px;
      font-size: .5rem;
      opacity: .25;
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="planet"></div>
<div class="astronaut">👨‍🚀</div>

<div class="calc-wrap">
  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>

  <div class="calc">
    <div class="title">◈ SPACE CALC v1.0 ◈</div>

    <div class="status-row">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <span class="status-text" id="status">SISTEMA ONLINE</span>
    </div>

    <div class="display">
      <div class="display__history" id="history"></div>
      <div class="display__expr"   id="expr"></div>
      <div class="display__number" id="number">0</div>
    </div>

    <div class="grid">
      <button class="btn btn--ac"  onclick="limpar()">AC<span class="key-hint">Esc</span></button>
      <button class="btn btn--del" onclick="apagar()">⌫<span class="key-hint">←</span></button>
      <button class="btn btn--op"  onclick="inserir('%')">%</button>
      <button class="btn btn--op"  onclick="inserir('/')">÷<span class="key-hint">/</span></button>

      <button class="btn btn--num" onclick="inserir('7')">7</button>
      <button class="btn btn--num" onclick="inserir('8')">8</button>
      <button class="btn btn--num" onclick="inserir('9')">9</button>
      <button class="btn btn--op"  onclick="inserir('*')">×<span class="key-hint">*</span></button>

      <button class="btn btn--num" onclick="inserir('4')">4</button>
      <button class="btn btn--num" onclick="inserir('5')">5</button>
      <button class="btn btn--num" onclick="inserir('6')">6</button>
      <button class="btn btn--op"  onclick="inserir('-')">−<span class="key-hint">-</span></button>

      <button class="btn btn--num" onclick="inserir('1')">1</button>
      <button class="btn btn--num" onclick="inserir('2')">2</button>
      <button class="btn btn--num" onclick="inserir('3')">3</button>
      <button class="btn btn--op"  onclick="inserir('+')">+</button>

      <button class="btn btn--num btn--zero" onclick="inserir('0')">0</button>
      <button class="btn btn--num" onclick="inserir('.')">.</button>
      <button class="btn btn--eq" onclick="calcular()">ENTER<span class="key-hint">↵</span></button>
    </div>
  </div>
</div>

<script>
/* ── Estrelas + estrelas cadentes ── */
(function(){
  var c = document.getElementById('stars');
  var ctx = c.getContext('2d');
  var W, H;

  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  // Estrelas estáticas
  var stars = [];
  for(var i=0;i<220;i++){
    stars.push({
      x: Math.random()*1920, y: Math.random()*1080,
      r: Math.random()*1.2+.2,
      alpha: Math.random()*.8+.2,
      twinkle: Math.random()*Math.PI*2
    });
  }

  // Estrelas cadentes
  var shooters = [];
  function spawnShooter(){
    shooters.push({ x: Math.random()*W*.7, y: Math.random()*H*.4, len: 120+Math.random()*80, speed: 8+Math.random()*6, alpha: 1 });
  }
  setInterval(spawnShooter, 2200);

  function draw(){
    ctx.clearRect(0,0,W,H);

    // Nebulosa de fundo
    var grad = ctx.createRadialGradient(W*.15, H*.2, 0, W*.15, H*.2, W*.5);
    grad.addColorStop(0, 'rgba(40,0,80,0.18)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

    var grad2 = ctx.createRadialGradient(W*.8, H*.7, 0, W*.8, H*.7, W*.4);
    grad2.addColorStop(0, 'rgba(0,30,80,0.15)');
    grad2.addColorStop(1, 'transparent');
    ctx.fillStyle = grad2; ctx.fillRect(0,0,W,H);

    // Estrelas
    stars.forEach(function(s){
      s.twinkle += .015;
      var a = s.alpha * (.6 + .4*Math.sin(s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,'+a+')';
      ctx.fill();
    });

    // Estrelas cadentes
    shooters = shooters.filter(function(s){
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x + s.len, s.y + s.len*.4);
      var g = ctx.createLinearGradient(s.x,s.y,s.x+s.len,s.y+s.len*.4);
      g.addColorStop(0,'rgba(255,255,255,0)');
      g.addColorStop(1,'rgba(0,245,255,'+s.alpha+')');
      ctx.strokeStyle = g;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      s.x += s.speed; s.y += s.speed*.4; s.alpha -= .018;
      return s.alpha > 0;
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Som de clique (Web Audio) ── */
var audioCtx;
function beep(freq, dur, type){
  try {
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type||'sine';
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e){}
}

/* ── Calculadora ── */
var expressao = '';
var acabouDeCalcular = false;
var statusMsgs = ['SISTEMA ONLINE','PROCESSANDO...','PRONTO','AGUARDANDO INPUT','MÓDULO ATIVO'];

function setStatus(msg){ document.getElementById('status').textContent = msg; }

function pop(){
  var el = document.getElementById('number');
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(function(){ el.classList.remove('pop'); }, 200);
}

function atualizar(){
  var exprEl   = document.getElementById('expr');
  var numberEl = document.getElementById('number');
  exprEl.textContent = expressao.replace(/\*/g,'×').replace(/\//g,'÷');
  if(!expressao){ numberEl.textContent = '0'; return; }
  var partes = expressao.split(/[\+\-\*\/]/);
  var ultimo = partes[partes.length-1];
  numberEl.textContent = ultimo !== '' ? ultimo : expressao.replace(/\*/g,'×').replace(/\//g,'÷');
}

function inserir(v){
  beep(v==='+'||v==='-'?600:v==='*'||v==='/'?800:440, .07);
  var ops=['+','-','*','/'];
  if(acabouDeCalcular && !ops.includes(v)){ expressao=''; }
  acabouDeCalcular = false;
  var ultimo = expressao.slice(-1);
  if(ops.includes(v) && ops.includes(ultimo)) expressao = expressao.slice(0,-1);
  if(v==='.'){
    var partes=expressao.split(/[\+\-\*\/]/);
    if(partes[partes.length-1].includes('.')) return;
    if(partes[partes.length-1]==='') expressao+='0';
  }
  expressao += v;
  setStatus('INPUT: '+expressao.slice(-6));
  pop(); atualizar();
}

function limpar(){
  beep(200,.15,'sawtooth');
  expressao=''; acabouDeCalcular=false;
  document.getElementById('history').textContent='';
  document.getElementById('expr').textContent='';
  document.getElementById('number').textContent='0';
  setStatus('SISTEMA RESETADO');
  setTimeout(function(){ setStatus('AGUARDANDO INPUT'); },1200);
}

function apagar(){
  beep(300,.07,'square');
  expressao=expressao.slice(0,-1);
  atualizar();
}

function calcular(){
  if(!expressao) return;
  beep(880,.06); setTimeout(function(){ beep(1100,.1); },80);
  try{
    var res = Function('"use strict"; return ('+expressao+')')();
    var fmt = parseFloat(res.toFixed(10)).toString();
    document.getElementById('history').textContent =
      expressao.replace(/\*/g,'×').replace(/\//g,'÷')+' =';
    document.getElementById('expr').textContent='';
    document.getElementById('number').textContent=fmt;
    pop();
    expressao=fmt; acabouDeCalcular=true;
    setStatus('RESULTADO: '+fmt);
  } catch(e){
    document.getElementById('number').textContent='ERRO';
    expressao='';
    beep(150,.3,'sawtooth');
    setStatus('ERRO DE CÁLCULO');
    setTimeout(function(){ setStatus('AGUARDANDO INPUT'); },1500);
  }
}

/* Ripple */
document.querySelectorAll('.btn').forEach(function(btn){
  btn.addEventListener('click',function(e){
    var r=document.createElement('span'); r.className='ripple';
    var size=Math.max(btn.offsetWidth,btn.offsetHeight);
    var rect=btn.getBoundingClientRect();
    r.style.cssText='width:'+size+'px;height:'+size+'px;left:'+(e.clientX-rect.left-size/2)+'px;top:'+(e.clientY-rect.top-size/2)+'px';
    btn.appendChild(r); setTimeout(function(){ r.remove(); },500);
  });
});

/* Teclado */
document.addEventListener('keydown',function(e){
  if(e.key>='0'&&e.key<='9') inserir(e.key);
  else if(e.key==='+') inserir('+');
  else if(e.key==='-') inserir('-');
  else if(e.key==='*') inserir('*');
  else if(e.key==='/'){ e.preventDefault(); inserir('/'); }
  else if(e.key==='%') inserir('%');
  else if(e.key==='.') inserir('.');
  else if(e.key==='Enter'||e.key==='=') calcular();
  else if(e.key==='Backspace') apagar();
  else if(e.key==='Escape') limpar();
});
</script>
</body>
</html>
